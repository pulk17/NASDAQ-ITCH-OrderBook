# Deploys report/ (static WASM demo + backtest report) to GitHub Pages — free hosting.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".
#
# NOTE: this deploys from a git checkout, so it only publishes what is COMMITTED.
# report/tapes/ and report/features/ are gitignored (~550 MB of generated data), so as
# configured this ships the pages without their data. Either un-ignore them and accept a
# 550 MB repo, or use the recommended path instead — Cloudflare direct upload, which
# needs nothing committed:  npx wrangler pages deploy report --project-name pitchfork
name: deploy-pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: report
      - id: deployment
        uses: actions/deploy-pages@v4
